<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouver un logement - AlternHome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .hero-recherche {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-recherche::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        
        .hero-recherche .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .hero-recherche h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 0;
            line-height: 1.2;
        }
        
        .video-section {
            padding: 80px 20px;
            background: white;
        }
        
        .video-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .video-placeholder {
            width: 100%;
            height: 600px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .steps-section {
            padding: 80px 20px;
            background: #F9FAFB;
        }
        
        .steps-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .steps-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 60px;
            color: var(--gray-900);
        }
        
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }
        
        .step-card {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .step-number {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 auto 20px;
        }
        
        .step-card h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 15px;
        }
        
        .step-card p {
            font-size: 16px;
            color: var(--gray-600);
            line-height: 1.6;
        }
        
        .advantages-section {
            padding: 80px 20px;
            background: white;
        }
        
        .advantages-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .advantages-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 50px;
            color: var(--gray-900);
        }
        
        .advantage-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 30px;
            padding: 25px;
            background: #F9FAFB;
            border-radius: 12px;
        }
        
        .advantage-icon {
            font-size: 40px;
            flex-shrink: 0;
        }
        
        .advantage-content h4 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }
        
        .advantage-content p {
            font-size: 16px;
            color: var(--gray-600);
            line-height: 1.6;
        }
        
        .cta-section {
            padding: 80px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            text-align: center;
            color: white;
        }
        
        .cta-section h2 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .cta-section p {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.3);
        }
        
        .cta-btn-secondary {
            display: inline-block;
            padding: 14px 35px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .cta-btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav>
        <div class="container">
            <a href="index.html" class="logo">🏠 AlternHome</a>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="#" id="monEspaceLink">Mon espace</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
                <li><a href="#">Devenir hôte</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-recherche">
        <div class="container">
            <h1>Trouve ton logement<br>adapté à ton alternance</h1>
        </div>
    </section>

    <!-- VIDÉO -->
    <section class="video-section">
        <div class="video-container">
            <h2 style="font-size: 38px; font-weight: 700; text-align: center; margin-bottom: 50px; color: #1a202c;">Comment ça marche ?</h2>
            <div class="video-placeholder">
                🎬 Vidéo explicative : Trouver son logement<br>
                (2 minutes - à venir)
            </div>
            
            <!-- CTA juste après la vidéo -->
            <div style="text-align: center; margin-top: 60px;">
                <h2 style="font-size: 28px; font-weight: 700; margin-bottom: 15px; color: #1a202c;">Prêt à trouver ton logement idéal ?</h2>
                <p id="ctaText" style="font-size: 16px; margin-bottom: 30px; color: #4a5568;">Commence ta recherche dès maintenant</p>
                <div id="ctaButtons">
                    <!-- Sera rempli par JavaScript -->
                </div>
            </div>
        </div>
    </section>


    <script>
        async function gererLienMonEspace() {
            const lien = document.getElementById('monEspaceLink');
            if (!lien) return;
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('type_user')
                    .eq('id', user.id)
                    .single();
                
                if (userData?.type_user === 'hote') {
                    lien.href = 'dashboard-hote.html';
                } else {
                    lien.href = 'dashboard-locataire.html';
                }
            } else {
                lien.href = 'connexion.html';
            }
        }
        
        // Gérer le CTA selon le statut de connexion
        async function gererCTA() {
            const ctaButtons = document.getElementById('ctaButtons');
            const ctaText = document.getElementById('ctaText');
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                // Connecté : rediriger vers recherche
                ctaText.textContent = "Commence ta recherche maintenant";
                ctaButtons.innerHTML = '<a href="recherche.html" class="cta-btn">Rechercher un logement</a>';
            } else {
                // Non connecté : 2 boutons
                ctaButtons.innerHTML = `
                    <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                        <a href="inscription.html" class="cta-btn">Créer mon compte</a>
                        <a href="connexion.html" class="cta-btn-secondary">Se connecter</a>
                    </div>
                `;
            }
        }
        
        gererLienMonEspace();
        gererCTA();
    </script>
</body>
</html>
