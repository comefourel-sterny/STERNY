<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>OG Image STERNY</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .og {
            width: 1200px;
            height: 630px;
            background: linear-gradient(145deg, #1E293B 0%, #0F172A 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle glow */
        .og::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -100px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 98, 42, 0.06) 0%, transparent 70%);
        }

        /* Top orange line */
        .top-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: #E8622A;
        }

        /* Centered content */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Logo as image — crisp rendering */
        .logo img {
            height: 160px;
            width: auto;
        }

        /* Tagline */
        .tagline {
            color: white;
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-align: center;
        }

        .tagline .highlight {
            color: #E8622A;
        }

        /* Domain */
        .domain {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .domain .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #51cf66;
        }

        .domain span {
            color: rgba(255, 255, 255, 0.45);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

    </style>
</head>
