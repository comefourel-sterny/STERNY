    <style>
        html { background: #E8622A; }
        html, body {
            height: 100%;
            margin: 0;
        }

        .page-connexion {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .connexion-card {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 36px 36px;
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.12);
            border: 1.5px solid #E8EAF0;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .connexion-card form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .connexion-card .submit-btn {
            margin-top: auto;
        }

        .connexion-card:hover {
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.16);
        }

        /* Header */
        .connexion-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .connexion-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1E293B;
            margin: 0 0 6px 0;
        }

        .connexion-header p {
            color: #6B7280;
            font-size: 15px;
            margin: 0;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 16px;
            border: 1.5px solid #E8EAF0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #F4F5F7;
            color: #1E293B;
        }

        .form-group input:focus {
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.08);
            background: white;
        }

        .form-group input:hover {
            border-color: #CBD5E1;
        }

        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #F4F5F7 inset;
            -webkit-text-fill-color: #1E293B;
            border-color: #E8EAF0;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Error message */
        .error-box {
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            text-align: center;
            line-height: 1.4;
        }

        .error-box.error {
            display: block;
            background: rgba(232, 98, 42, 0.08);
            color: #E8622A;
        }

        .error-box.success {
            display: block;
            background: #D1FAE5;
            color: #065F46;
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #E8622A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: #d4571f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 98, 42, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1.5px solid #E8EAF0;
            color: #6B7280;
            font-size: 14px;
        }

        .back-link a {
            color: #9CA3AF;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #6B7280;
        }
    </style>
    <script src="rate-limiter.js"></script>
    <script src="analytics.js" defer></script>

<body>

            </ul>
        </div>
    </nav>

    <div class="page-connexion">
        <div class="connexion-card">
            <div class="connexion-header">
                <h2>Mot de passe oubli&eacute; ?</h2>
                <p>Entre ton email, on t'envoie un lien de r&eacute;initialisation.</p>
            </div>

            <div id="messageBox" class="error-box"></div>

            <form id="resetForm" onsubmit="envoyerReset(event)">
                <div class="form-group">
                    <label>Adresse email</label>
                    <input type="email" id="email" placeholder="ton.email@exemple.com" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Envoyer le lien
                </button>
            </form>

            <div class="back-link">
                <a href="connexion.html">&larr; Retour</a>
            </div>
        </div>
    </div>

    <script>
        async function envoyerReset(event) {
            event.preventDefault();

            // Rate limit : max 3 demandes par 5 minutes (anti-spam)
            if (!RateLimiter.check('password_reset', 3, 300000, { persistent: true })) return;

            var email = document.getElementById('email').value.trim();
            var submitBtn = document.getElementById('submitBtn');
            var messageBox = document.getElementById('messageBox');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Envoi en cours...';

            try {
                // redirectTo = la page où l'utilisateur arrivera après avoir cliqué sur le lien email
                var redirectUrl = window.location.origin + window.location.pathname.replace('mot-de-passe-oublie.html', 'reset-password.html');

                var result = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl
                });

                if (result.error) throw result.error;

                // Toujours afficher un message de succès (même si l'email n'existe pas)
                // pour éviter l'énumération de comptes
                messageBox.textContent = 'Si un compte existe avec cet email, tu recevras un lien de réinitialisation dans quelques instants. Pense à vérifier tes spams.';
                messageBox.className = 'error-box success';

                // Désactiver le formulaire
                document.getElementById('email').disabled = true;

            } catch (error) {
                messageBox.textContent = 'Une erreur est survenue. Réessaie dans quelques instants.';
                messageBox.className = 'error-box error';
                console.error('Erreur reset password:', error);

                submitBtn.disabled = false;
                submitBtn.textContent = 'Envoyer le lien';
            }
        }
    </script>
<script src="cookie-banner.js"></script>
