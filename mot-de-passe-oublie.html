<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="PP-Sterny-V1.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-white.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="favicon.ico" sizes="any" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.ico" sizes="any" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Mot de passe oubli&eacute; — STERNY</title>
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .page-reset {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .reset-card {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1.5px solid #E8EAF0;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .reset-header .icon {
            width: 56px;
            height: 56px;
            background: rgba(232, 98, 42, 0.08);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .reset-header .icon svg {
            color: #E8622A;
        }

        .reset-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1E293B;
            margin: 0 0 6px 0;
        }

        .reset-header p {
            color: #64748B;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 16px;
            border: 1.5px solid #E8EAF0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #F4F5F7;
            color: #1E293B;
        }

        .form-group input:focus {
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.08);
            background: white;
        }

        .message-box {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            text-align: center;
            line-height: 1.4;
        }

        .message-box.error {
            display: block;
            background: rgba(232, 98, 42, 0.08);
            color: #E8622A;
        }

        .message-box.success {
            display: block;
            background: #D1FAE5;
            color: #065F46;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #E8622A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: #d4571f;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1.5px solid #E8EAF0;
        }

        .back-link a {
            color: #E8622A;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .back-link a:hover {
            opacity: 0.8;
        }
    </style>
    <script src="rate-limiter.js"></script>
    <script src="analytics.js" defer></script>
</head>
<body>
    <!-- NAVIGATION -->
    <nav role="navigation" aria-label="Navigation principale">
        <div class="container">
            <a href="index.html" class="logo"><img src="Logo-Sterny-V1.svg" alt="STERNY"></a>
            <button class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="menu-overlay" onclick="toggleMenu()"></div>
        <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="connexion.html" class="nav-highlight">Connexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-reset">
        <div class="reset-card">
            <div class="reset-header">
                <div class="icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h2>Mot de passe oublié ?</h2>
                <p>Entre ton adresse email et on t'envoie un lien pour réinitialiser ton mot de passe.</p>
            </div>

            <div id="messageBox" class="message-box"></div>

            <form id="resetForm" aria-label="Ru00e9initialiser le mot de passe" onsubmit="envoyerReset(event)">
                <div class="form-group">
                    <label>Adresse email</label>
                    <input type="email" id="email" placeholder="ton.email@exemple.com" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Envoyer le lien
                </button>
            </form>

            <div class="back-link">
                <a href="connexion.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Retour à la connexion
                </a>
            </div>
        </div>
    </div>

    <script>
        async function envoyerReset(event) {
            event.preventDefault();

            // Rate limit : max 3 demandes par 5 minutes (anti-spam)
            if (!RateLimiter.check('password_reset', 3, 300000, { persistent: true })) return;

            var email = document.getElementById('email').value.trim();
            var submitBtn = document.getElementById('submitBtn');
            var messageBox = document.getElementById('messageBox');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Envoi en cours...';

            try {
                // redirectTo = la page où l'utilisateur arrivera après avoir cliqué sur le lien email
                var redirectUrl = window.location.origin + window.location.pathname.replace('mot-de-passe-oublie.html', 'reset-password.html');

                var result = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: redirectUrl
                });

                if (result.error) throw result.error;

                // Toujours afficher un message de succès (même si l'email n'existe pas)
                // pour éviter l'énumération de comptes
                messageBox.textContent = 'Si un compte existe avec cet email, tu recevras un lien de réinitialisation dans quelques instants. Pense à vérifier tes spams.';
                messageBox.className = 'message-box success';

                // Désactiver le formulaire
                document.getElementById('email').disabled = true;

            } catch (error) {
                messageBox.textContent = 'Une erreur est survenue. Réessaie dans quelques instants.';
                messageBox.className = 'message-box error';
                console.error('Erreur reset password:', error);

                submitBtn.disabled = false;
                submitBtn.textContent = 'Envoyer le lien';
            }
        }
    </script>
<script src="cookie-banner.js"></script>
<script>function toggleMenu(){var u=document.querySelector("nav ul");var h=document.querySelector(".hamburger");var o=document.querySelector(".menu-overlay");u.classList.toggle("open");h.classList.toggle("active");o.classList.toggle("active");}</script>
</body>
</html>
