    <link rel="stylesheet" href="style.css">
    <style>
        html { background: #E8622A; }
        .page-inscription {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .inscription-container {
            max-width: 460px;
            min-height: 546px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 36px 36px;
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.12);
            border: 1.5px solid #E8EAF0;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .inscription-container:hover {
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.16);
        }

        .inscription-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .inscription-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1E293B;
            margin: 0 0 6px 0;
        }

        .inscription-header p {
            color: #6B7280;
            font-size: 15px;
            margin: 0;
        }

        /* Options de profil */
        .profile-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 22px;
        }

        .profile-card {
            position: relative;
            border: 1.5px solid #E8EAF0;
            border-radius: 12px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .profile-card:hover {
            border-color: #E8622A;
            background: #FFF4ED;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 98, 42, 0.12);
        }

        .profile-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .profile-card:has(input:checked) {
            border-color: #E8622A;
            background: linear-gradient(135deg, #FFF4ED 0%, #FFEDD5 100%);
            box-shadow: 0 4px 16px rgba(232, 98, 42, 0.2);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .profile-card:has(input:checked) .card-icon {
            background: rgba(232, 98, 42, 0.12);
        }

        .card-content {
            flex: 1;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #1E293B;
        }

        .profile-card:has(input:checked) .card-title {
            color: #1E293B;
            font-weight: 700;
        }

        .card-description {
            font-size: 14px;
            color: #6B7280;
            line-height: 1.5;
        }

        .card-check {
            width: 22px;
            height: 22px;
            border: 1.5px solid #E8EAF0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .profile-card:has(input:checked) .card-check {
            background: #E8622A;
            border-color: #E8622A;
            color: white;
            transform: scale(1.1);
        }

        /* Bouton Continuer */
        .btn-continuer {
            width: 100%;
            padding: 16px;
            background: #E8622A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
            font-family: inherit;
        }

        .btn-continuer:hover:not(:disabled) {
            background: #d4571f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 98, 42, 0.3);
        }

        .btn-continuer:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-continuer:disabled {
            background: #E8EAF0;
            color: #9CA3AF;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Lien retour */
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1.5px solid #E8EAF0;
            color: #6B7280;
            font-size: 14px;
        }

        .back-link a {
            color: #E8622A;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="analytics.js" defer></script>
</head>
<body>

    <nav role="navigation" aria-label="Navigation principale">

            <a href="index.html" class="logo"><img src="Logo-Sterny-V1.svg" alt="STERNY"></a>

        <ul>

                <li><a href="connexion.html">Connexion</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
            </ul>
        </div>
    </nav>

    <!-- PAGE PLEIN ECRAN -->
    <section class="page-inscription">
        <div class="inscription-container">
            <div class="inscription-header">
                <h1>Créer un compte</h1>
                <p>Pour commencer, indique-nous ton profil</p>
            </div>

            <div class="profile-options">
                <!-- Propriétaire -->
                <label class="profile-card" for="typeProprietaire">
                    <input type="radio" name="profileType" id="typeProprietaire" value="proprietaire">
                    <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="#6B7280"><path d="M700-200h40v-100h100v-40H740v-100h-40v100H600v40h100v100Zm20 80q-83 0-141.5-58.5T520-320q0-83 58.5-141.5T720-520q83 0 141.5 58.5T920-320q0 83-58.5 141.5T720-120Zm-560-80v-480l320-240 320 240v92q-19-6-39-9t-41-3v-40L480-820 240-640v360h203q3 21 9 41t15 39H160Zm320-350Z"/></svg></div>
                    <div class="card-content">
                        <div class="card-title">Je suis propriétaire</div>
                        <div class="card-description">Je loue mon bien à des alternants</div>
                    </div>
                    <div class="card-check">✓</div>
                </label>

                <!-- Étudiant en alternance -->
                <label class="profile-card" for="typeEtudiant">
                    <input type="radio" name="profileType" id="typeEtudiant" value="etudiant">
                    <div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="#6B7280"><path d="M480-120 200-272v-240L40-600l440-240 440 240v320h-80v-276l-80 44v240L480-120Zm0-332 274-148-274-148-274 148 274 148Zm0 241 200-108v-151L480-362 280-470v151l200 108Zm0-241Zm0 90Zm0 0Z"/></svg></div>
                    <div class="card-content">
                        <div class="card-title">Je suis étudiant en alternance</div>
                        <div class="card-description">Je cherche ou je partage un logement</div>
                    </div>
                    <div class="card-check">✓</div>
                </label>
            </div>

            <button class="btn-continuer" id="btnContinuer" disabled onclick="continuer()">
                Continuer
            </button>

            <div class="back-link">
                Déjà un compte ? <a href="connexion.html">Se connecter</a>
            </div>
        </div>
    </section>

    <script>
        // Activer le bouton quand un profil est sélectionné
        document.querySelectorAll('input[name="profileType"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.getElementById('btnContinuer').disabled = false;
            });
        });

        // Rediriger vers la page d'inscription correspondante
        function continuer() {
            const selected = document.querySelector('input[name="profileType"]:checked');
            if (!selected) return;

            const routes = {
                'proprietaire': 'inscription-proprietaire.html',
                'etudiant': 'inscription-recherche.html'
            };

            window.location.href = routes[selected.value];
        }
    </script>
<script src="cookie-banner.js"></script>
