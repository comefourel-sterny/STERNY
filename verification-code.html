<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code de parrainage - AlternHome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verification-container {
            background: white;
            border-radius: 24px;
            padding: 60px 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            text-transform: none;
            letter-spacing: normal;
            font-weight: 400;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }

        .help-text {
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .help-text strong {
            color: #374151;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .verification-container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="verification-container">
        <div class="logo">✅</div>
        <h1>Parfait ! Une dernière étape</h1>
        <p class="subtitle">Pour continuer, entrez le code de parrainage que vous avez reçu de votre locataire</p>

        <form id="codeForm" onsubmit="verifierCode(event)">
            <div class="form-group">
                <label>Code de parrainage</label>
                <input 
                    type="text" 
                    id="codeInput" 
                    placeholder="Ex: THOMAS-2024"
                    required
                    autocomplete="off"
                >
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Continuer →
            </button>

            <div class="message" id="messageBox"></div>
        </form>

        <div class="help-text">
            <strong>💡 Vous n'avez pas de code ?</strong><br>
            Contactez votre locataire ou l'étudiant qui vous a recommandé AlternHome.
        </div>

        <a href="presentation-proprietaire.html" class="back-link">← Retour à la présentation</a>
    </div>

    <script>
        // Vérifier si un code est déjà dans l'URL (venant d'un email)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const codeFromUrl = urlParams.get('code');
            
            if (codeFromUrl) {
                document.getElementById('codeInput').value = codeFromUrl;
            }
        });

        // Fonction de vérification du code
        async function verifierCode(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');
            const codeInput = document.getElementById('codeInput').value.trim().toUpperCase();
            
            // Validation simple
            if (!codeInput) {
                showMessage('error', '⚠️ Veuillez entrer un code de parrainage');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Vérification...';
            
            try {
                // Rechercher l'utilisateur qui a ce code de parrainage
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id, prenom, nom')
                    .eq('code_parrainage', codeInput)
                    .single();
                
                if (error || !data) {
                    throw new Error('Code invalide');
                }
                
                // Code valide ! Stocker le parrain et rediriger
                sessionStorage.setItem('referrer_id', data.id);
                sessionStorage.setItem('referrer_name', `${data.prenom}-${data.nom}`.toLowerCase());
                sessionStorage.setItem('referral_code', codeInput);
                
                showMessage('success', '✅ Code valide ! Redirection...');
                
                setTimeout(() => {
                    window.location.href = `inscription-proprietaire.html?parrain=${data.prenom.toLowerCase()}-${data.nom.toLowerCase()}`;
                }, 1500);
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('error', '❌ Code de parrainage invalide. Vérifiez le code et réessayez.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continuer →';
            }
        }

        // Afficher un message
        function showMessage(type, text) {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = 'message ' + type + ' show';
            messageBox.textContent = text;
        }
    </script>

</body>
</html>
