<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="favicon.ico" sizes="any" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.ico" sizes="any" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Compl&egrave;te ton profil — STERNY</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        /* NAV — aligné sur dashboards */
        nav {
            border-bottom: 2px solid rgba(232, 98, 42, 0.12) !important;
        }
        nav ul {
            gap: 8px !important;
        }
        nav a {
            color: #475569 !important;
            font-weight: 500 !important;
            font-size: 14px !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
            text-decoration: none !important;
        }
        nav a:hover {
            color: #E8622A !important;
            background: rgba(232, 98, 42, 0.06) !important;
        }
        nav a.nav-highlight {
            color: #E8622A !important;
            font-weight: 600 !important;
        }

        .page-inscription {
            min-height: calc(100vh - 85px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .inscription-container {
            position: relative;
            max-width: 480px;
            width: 100%;
            height: 560px;
            background: white;
            border-radius: 16px;
            padding: 32px 36px;
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.12);
            border: 1px solid #E8EAF0;
            display: flex;
            flex-direction: column;
        }

        .inscription-header {
            text-align: center;
            margin-bottom: 14px;
        }

        .inscription-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1E293B;
            margin: 0;
        }

        /* Indicateur d'étape */
        .step-indicator {
            text-align: center;
            font-size: 11px;
            color: #9CA3AF;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Barre de progression */
        .progress-bar {
            height: 3px;
            background: #E8EAF0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #E8622A;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* Steps */
        .step {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .step.active {
            display: flex;
        }

        .step-content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .step-content::-webkit-scrollbar {
            display: none;
        }

        /* Champs */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #475569;
            font-size: 13px;
        }

        .form-group .required {
            color: #E8622A;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E8EAF0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: white;
            box-sizing: border-box;
            color: #1E293B;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.06);
        }

        .form-group input::placeholder {
            color: #9CA3AF;
        }

        .form-group select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231E293B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .form-group select.placeholder {
            color: #9CA3AF;
        }

        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E8EAF0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: white;
            box-sizing: border-box;
            color: #1E293B;
            resize: vertical;
            min-height: 80px;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.06);
        }

        .form-group textarea::placeholder {
            color: #9CA3AF;
        }

        .hint {
            font-size: 11px;
            color: #9CA3AF;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Photo de profil */
        .photo-upload {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .photo-circle {
            width: 64px;
            height: 64px;
            min-width: 64px;
            border-radius: 50%;
            background: #F4F5F7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            border: 1.5px solid #E2E5EA;
        }

        .photo-circle:hover {
            border-color: #E8622A;
        }

        .photo-circle .placeholder svg {
            width: 24px;
            height: 24px;
            color: #9CA3AF;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-info {
            flex: 1;
        }

        .photo-info .photo-title {
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 2px;
        }

        .photo-info .photo-hint {
            font-size: 12px;
            color: #9CA3AF;
        }

        #dateNaissance::placeholder {
            letter-spacing: 1.5px;
            font-size: 13px;
        }

        /* MODAL RECADRAGE */
        .crop-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .crop-overlay.active {
            display: flex;
        }

        .crop-modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: calc(100% - 40px);
            text-align: center;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        }

        .crop-modal h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 6px;
        }

        .crop-modal .crop-hint {
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 20px;
        }

        .crop-area {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 16px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #E8EAF0;
            cursor: grab;
            touch-action: none;
            background: #F3F4F6;
        }

        .crop-area:active {
            cursor: grabbing;
        }

        .crop-area img {
            position: absolute;
            max-width: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Slider zoom */
        .crop-zoom {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .crop-zoom label {
            font-size: 12px;
            color: #6B7280;
            font-weight: 600;
            white-space: nowrap;
        }

        .crop-zoom input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #E8EAF0;
            border-radius: 4px;
            outline: none;
        }

        .crop-zoom input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #E8622A;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(232, 98, 42, 0.3);
        }

        .crop-zoom input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #E8622A;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(232, 98, 42, 0.3);
        }

        .crop-actions {
            display: flex;
            gap: 10px;
        }

        .crop-actions button {
            flex: 1;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .crop-cancel {
            background: white;
            color: #475569;
            border: 1.5px solid #E2E5EA;
        }

        .crop-cancel:hover {
            border-color: #E8622A;
            color: #E8622A;
        }

        .crop-confirm {
            background: #1E293B;
            color: white;
            border: none;
        }

        .crop-confirm:hover {
            background: #E8622A;
        }

        /* Boutons navigation */
        .buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
            padding-top: 10px;
            flex-shrink: 0;
        }

        .buttons-row.single {
            grid-template-columns: 1fr;
        }

        .btn-back {
            height: 40px;
            padding: 0 16px;
            background: white;
            color: #475569;
            border: 1.5px solid #E2E5EA;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .btn-back:hover {
            border-color: #E8622A;
            color: #E8622A;
        }

        .btn-next {
            height: 40px;
            padding: 0 16px;
            background: #1E293B;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .btn-next:hover {
            background: #E8622A;
        }

        .btn-next:disabled {
            background: #E8EAF0;
            color: #9CA3AF;
            cursor: not-allowed;
        }

        /* Lien retour */
        .back-link {
            text-align: center;
            margin-top: 8px;
            color: #6B7280;
            font-size: 13px;
        }

        .back-link a {
            color: #E8622A;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Erreur */
        .error-message {
            position: absolute;
            bottom: 36px;
            left: 36px;
            right: 36px;
            background: #FEE2E2;
            border: 1px solid #FECACA;
            color: #991B1B;
            padding: 12px 14px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
            z-index: 20;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.08);
            animation: slideUpError 0.25s ease;
        }

        @keyframes slideUpError {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Autocomplete école */
        .school-search-wrapper {
            position: relative;
        }

        .school-search-wrapper input {
            padding-left: 38px !important;
        }

        .school-search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .school-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1.5px solid #E8EAF0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            display: none;
        }

        .school-suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            color: #1E293B;
            border-bottom: 1px solid #F3F4F6;
            transition: background 0.15s;
        }

        .school-suggestion-item:last-child {
            border-bottom: none;
        }

        .school-suggestion-item:hover {
            background: rgba(232, 98, 42, 0.06);
        }

        .school-suggestion-item small {
            display: block;
            font-size: 11px;
            color: #9CA3AF;
            margin-top: 1px;
        }

        /* Autocomplete année */
        .annee-search-wrapper {
            position: relative;
        }

        .annee-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1.5px solid #E8EAF0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            display: none;
        }

        .annee-suggestion-item {
            padding: 9px 14px;
            cursor: pointer;
            font-size: 13px;
            color: #1E293B;
            border-bottom: 1px solid #F3F4F6;
            transition: background 0.15s;
        }

        .annee-suggestion-item:last-child {
            border-bottom: none;
        }

        .annee-suggestion-item:hover {
            background: rgba(232, 98, 42, 0.06);
        }

        .annee-suggestion-item small {
            color: #9CA3AF;
            font-weight: 400;
        }

        /* Autocomplete filière */
        .filiere-search-wrapper {
            position: relative;
        }

        .filiere-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1.5px solid #E8EAF0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            display: none;
        }

        .filiere-suggestion-item {
            padding: 9px 14px;
            cursor: pointer;
            font-size: 13px;
            color: #1E293B;
            border-bottom: 1px solid #F3F4F6;
            transition: background 0.15s;
        }

        .filiere-suggestion-item:last-child {
            border-bottom: none;
        }

        .filiere-suggestion-item:hover {
            background: rgba(232, 98, 42, 0.06);
        }

        .filiere-suggestion-item small {
            color: #9CA3AF;
            font-weight: 400;
        }

        /* Loading */
        .btn-next.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-next.loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Confirmation */
        .confirmation-screen {
            display: none;
            text-align: center;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .confirmation-screen.active {
            display: flex;
        }

        .confirmation-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .confirmation-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .confirmation-title {
            font-size: 22px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 8px;
        }

        .confirmation-text {
            font-size: 15px;
            color: #6B7280;
            line-height: 1.6;
        }
    </style>
    <script src="analytics.js" defer></script>
    <script src="notifications.js" defer></script>
</head>
<body>
    <!-- NAVIGATION -->
    <nav role="navigation" aria-label="Navigation principale">
        <div class="container">
            <a href="index.html" class="logo"><img src="Logo-Sterny-V1.svg" alt="STERNY"></a>
            <div id="notif-bell-container"></div>
        <button class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="menu-overlay" onclick="toggleMenu()"></div>
        <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
            </ul>
        </div>
    </nav>

    <!-- MODAL RECADRAGE PHOTO -->
    <div class="crop-overlay" id="cropOverlay" role="dialog" aria-modal="true" aria-label="Recadrer la photo">
        <div class="crop-modal">
            <h3>Recadre ta photo</h3>
            <p class="crop-hint">Déplace et zoome pour ajuster</p>
            <div class="crop-area" id="cropArea">
                <img loading="lazy" id="cropImage" src="" alt="Photo à recadrer">
            </div>
            <div class="crop-zoom">
                <label>Zoom</label>
                <input type="range" id="cropZoom" min="100" max="300" value="100">
            </div>
            <div class="crop-actions">
                <button class="crop-cancel" onclick="cancelCrop()">Annuler</button>
                <button class="crop-confirm" onclick="confirmCrop()">Valider</button>
            </div>
        </div>
    </div>

    <!-- PAGE -->
    <section class="page-inscription">
        <div class="inscription-container">
            <div class="inscription-header">
                <h1 id="mainTitle">Complète ton profil</h1>
            </div>

            <div class="step-indicator">Étape <span id="stepNum">1</span> sur 3</div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 33%"></div>
            </div>

            <div id="errorMessage" role="alert" aria-live="polite" class="error-message"></div>

            <!-- ÉTAPE 1 : Photo + Prénom/Nom -->
            <div class="step active" id="step1">
                <div class="step-content">
                    <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" style="display: none;">

                    <div class="photo-upload">
                        <div class="photo-circle" id="photoCircle">
                            <div class="placeholder" id="photoPlaceholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <img loading="lazy" id="photoPreview" src="" alt="Photo de profil" style="display: none;">
                        </div>
                        <div class="photo-info">
                            <div class="photo-title">Ajoute ta photo</div>
                            <div class="photo-hint">Clique sur le cercle — JPG, PNG (max 5 MB)</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Prénom <span class="required">*</span></label>
                            <input type="text" id="prenom" placeholder="Prénom">
                        </div>
                        <div class="form-group">
                            <label>Nom <span class="required">*</span></label>
                            <input type="text" id="nom" placeholder="Nom">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date de naissance <span class="required">*</span></label>
                            <input type="text" id="dateNaissance" placeholder="JJ/MM/AAAA" maxlength="10" autocomplete="off" inputmode="numeric">
                            <input type="hidden" id="dateNaissanceHidden">
                        </div>
                        <div class="form-group">
                            <label>Sexe <span class="required">*</span></label>
                            <select id="sexe" class="placeholder" onchange="this.classList.toggle('placeholder', !this.value);">
                                <option value="" disabled selected>Sélectionner</option>
                                <option value="homme">Homme</option>
                                <option value="femme">Femme</option>
                                <option value="autre">Autre</option>
                                <option value="non-precise">Non précisé</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="buttons-row single">
                    <button class="btn-next" onclick="nextStep(1)">Continuer</button>
                </div>
            </div>

            <!-- ÉTAPE 2 : Études -->
            <div class="step" id="step2">
                <div class="step-content">
                    <div class="form-group">
                        <label>École / Université <span class="required">*</span></label>
                        <div class="school-search-wrapper">
                            <span class="school-search-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            </span>
                            <input type="text" id="ecole" placeholder="Recherche ton école, université, CFA..." autocomplete="off">
                            <div class="school-suggestions" id="schoolSuggestions"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Année d'études <span class="required">*</span></label>
                        <div class="annee-search-wrapper">
                            <input type="text" id="anneeEtudes" placeholder="ex: L3, M1, Bac+5..." autocomplete="off">

    <script>
        // === CONFIGURATION ===
        let totalSteps = 3;
        let currentStep = 1;
        let userType = 'locataire';

        const stepTitles = {
            1: 'Complète ton profil',
            2: 'Tes études',
            3: 'À propos de toi'
        };

        // === NAVIGATION ===
        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('stepNum').textContent = step;
            document.getElementById('progressFill').style.width = (step / totalSteps * 100) + '%';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('mainTitle').textContent = stepTitles[step] || '';

            // Propriétaire : étape 1 unique → bouton "Enregistrer"
            if (userType === 'proprietaire' && step === 1) {
                const btnNext = document.querySelector('#step1 .btn-next');
                if (btnNext) btnNext.textContent = 'Enregistrer';
            }
        }

        function nextStep(current) {
            const error = validateStep(current);
            if (error) {
                showError(error);
                return;
            }
            let next = current + 1;
            // Propriétaire : après étape 1, enregistrer directement
            if (userType === 'proprietaire' && next >= 2) {
                enregistrerProfil();
                return;
            }
            currentStep = next;
            showStep(currentStep);
        }

        function prevStep(current) {
            currentStep = current - 1;
            showStep(currentStep);
        }

        let errorTimeout = null;
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            if (errorTimeout) clearTimeout(errorTimeout);
            errorTimeout = setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        // === VALIDATION ===
        function validateStep(step) {
            if (step === 1) {
                const prenom = document.getElementById('prenom').value.trim();
                const nom = document.getElementById('nom').value.trim();
                const dateDisplay = document.getElementById('dateNaissance').value;
                const dateISO = document.getElementById('dateNaissanceHidden').value;
                const sexe = document.getElementById('sexe').value;

                if (!prenom) return 'Merci de renseigner ton prénom';
                if (!nom) return 'Merci de renseigner ton nom';
                if (!dateDisplay || dateDisplay.length !== 10) return 'Date de naissance incomplète (JJ/MM/AAAA)';
                if (!dateISO) return 'Date de naissance invalide';
                if (!sexe) return 'Merci de sélectionner ton sexe';

                // Vérifier l'âge
                const birthDate = new Date(dateISO);
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const monthDiff = today.getMonth() - birthDate.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;

                if (age < 18) return 'Tu dois avoir au moins 18 ans';
            }

            if (step === 2) {
                const ecole = document.getElementById('ecole').value.trim();
                const anneeEtudes = document.getElementById('anneeEtudes').value.trim();
                const filiere = document.getElementById('filiere').value.trim();

                if (!ecole) return 'Merci de renseigner ton école';
                if (!anneeEtudes) return 'Merci de renseigner ton année d\'études';
                if (!filiere) return 'Merci de renseigner ta filière';
            }

            return null;
        }

        // === MAJUSCULE INTELLIGENTE ===
        function capitalizeWords(str) {
            return str.replace(/(?:^|[\s-])([a-zA-ZÀ-ÿ])/g, function(match) {
                return match.toUpperCase();
            });
        }

        document.getElementById('nom').addEventListener('input', function(e) {
            const pos = e.target.selectionStart;
            e.target.value = capitalizeWords(e.target.value);
            e.target.setSelectionRange(pos, pos);
        });

        document.getElementById('prenom').addEventListener('input', function(e) {
            const pos = e.target.selectionStart;
            e.target.value = capitalizeWords(e.target.value);
            e.target.setSelectionRange(pos, pos);
        });

        // === DATE DE NAISSANCE — formatage auto JJ/MM/AAAA ===
        document.getElementById('dateNaissance').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 8) value = value.slice(0, 8);

            let formatted = '';
            if (value.length > 0) formatted = value.slice(0, 2);
            if (value.length > 2) formatted += '/' + value.slice(2, 4);
            if (value.length > 4) formatted += '/' + value.slice(4, 8);

            e.target.value = formatted;

            if (value.length === 8) {
                const day = value.slice(0, 2);
                const month = value.slice(2, 4);
                const year = value.slice(4, 8);
                document.getElementById('dateNaissanceHidden').value = `${year}-${month}-${day}`;
            } else {
                document.getElementById('dateNaissanceHidden').value = '';
            }
        });

        document.getElementById('dateNaissance').addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value.endsWith('/')) {
                e.preventDefault();
                this.value = this.value.slice(0, -1);
                this.dispatchEvent(new Event('input'));
            }
        });

        // === PHOTO + RECADRAGE ===
        let currentUser = null;
        let photoFile = null;

        const photoCircle = document.getElementById('photoCircle');
        const photoInput = document.getElementById('photoInput');
        const photoPreview = document.getElementById('photoPreview');

        // Crop state
        const cropOverlay = document.getElementById('cropOverlay');
        const cropImage = document.getElementById('cropImage');
        const cropArea = document.getElementById('cropArea');
        const cropZoom = document.getElementById('cropZoom');
        let cropDragging = false;
        let cropStartX = 0, cropStartY = 0;
        let imgX = 0, imgY = 0;
        let imgStartX = 0, imgStartY = 0;
        let currentScale = 1;
        let originalFile = null;

        photoCircle.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) openCropper(e.target.files[0]);
        });

        function openCropper(file) {
            if (!file.type.match('image.*')) {
                showError('Le fichier doit être une image (JPG, PNG, WEBP)');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError('La photo ne doit pas dépasser 5 MB');
                return;
            }

            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                cropImage.src = e.target.result;
                cropImage.onload = () => {
                    // Centrer l'image dans le cercle
                    const areaSize = 260;
                    const ratio = Math.max(areaSize / cropImage.naturalWidth, areaSize / cropImage.naturalHeight);
                    currentScale = ratio;
                    cropZoom.min = Math.round(ratio * 100);
                    cropZoom.max = Math.round(ratio * 100 * 3);
                    cropZoom.value = Math.round(ratio * 100);

                    applyScale();
                    centerImage();
                    cropOverlay.classList.add('active');
                };
            };
            reader.readAsDataURL(file);
        }

        function applyScale() {
            const w = cropImage.naturalWidth * currentScale;
            const h = cropImage.naturalHeight * currentScale;
            cropImage.style.width = w + 'px';
            cropImage.style.height = h + 'px';
        }

        function centerImage() {
            const areaSize = 260;
            const w = cropImage.naturalWidth * currentScale;
            const h = cropImage.naturalHeight * currentScale;
            imgX = (areaSize - w) / 2;
            imgY = (areaSize - h) / 2;
            cropImage.style.left = imgX + 'px';
            cropImage.style.top = imgY + 'px';
        }

        function clampPosition() {
            const areaSize = 260;
            const w = cropImage.naturalWidth * currentScale;
            const h = cropImage.naturalHeight * currentScale;

            // L'image doit couvrir tout le cercle
            if (imgX > 0) imgX = 0;
            if (imgY > 0) imgY = 0;
            if (imgX < areaSize - w) imgX = areaSize - w;
            if (imgY < areaSize - h) imgY = areaSize - h;

            cropImage.style.left = imgX + 'px';
            cropImage.style.top = imgY + 'px';
        }

        // Zoom
        cropZoom.addEventListener('input', (e) => {
            const oldScale = currentScale;
            currentScale = parseInt(e.target.value) / 100;

            // Zoom centré
            const areaSize = 260;
            const centerX = areaSize / 2;
            const centerY = areaSize / 2;
            const relX = (centerX - imgX) / (cropImage.naturalWidth * oldScale);
            const relY = (centerY - imgY) / (cropImage.naturalHeight * oldScale);

            applyScale();

            imgX = centerX - relX * cropImage.naturalWidth * currentScale;
            imgY = centerY - relY * cropImage.naturalHeight * currentScale;
            clampPosition();
        });

        // Drag — souris
        cropArea.addEventListener('mousedown', (e) => {
            e.preventDefault();
            cropDragging = true;
            cropStartX = e.clientX;
            cropStartY = e.clientY;
            imgStartX = imgX;
            imgStartY = imgY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!cropDragging) return;
            imgX = imgStartX + (e.clientX - cropStartX);
            imgY = imgStartY + (e.clientY - cropStartY);
            clampPosition();
        });

        window.addEventListener('mouseup', () => { cropDragging = false; });

        // Drag — tactile
        cropArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                cropDragging = true;
                cropStartX = e.touches[0].clientX;
                cropStartY = e.touches[0].clientY;
                imgStartX = imgX;
                imgStartY = imgY;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!cropDragging || e.touches.length !== 1) return;
            imgX = imgStartX + (e.touches[0].clientX - cropStartX);
            imgY = imgStartY + (e.touches[0].clientY - cropStartY);
            clampPosition();
        }, { passive: true });

        window.addEventListener('touchend', () => { cropDragging = false; });

        function cancelCrop() {
            cropOverlay.classList.remove('active');
            photoInput.value = '';
        }

        function confirmCrop() {
            // Dessiner le résultat recadré sur un canvas
            const canvas = document.createElement('canvas');
            const size = 400; // Résolution de sortie
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Calculer la zone source
            const areaSize = 260;
            const sourceX = -imgX / currentScale;
            const sourceY = -imgY / currentScale;
            const sourceSize = areaSize / currentScale;

            ctx.drawImage(
                cropImage,
                sourceX, sourceY, sourceSize, sourceSize,
                0, 0, size, size
            );

            canvas.toBlob((blob) => {
                // Créer un fichier à partir du blob
                photoFile = new File([blob], 'photo-profil.jpg', { type: 'image/jpeg' });

                // Mettre à jour le preview
                const url = URL.createObjectURL(blob);
                photoPreview.src = url;
                photoPreview.style.display = 'block';
                document.getElementById('photoPlaceholder').style.display = 'none';

                cropOverlay.classList.remove('active');
                photoInput.value = '';
            }, 'image/jpeg', 0.9);
        }

            input.addEventListener('blur', function() {

                setTimeout(() => {
                    suggestionsDiv.style.display = 'none';
                }, 200); // Petit délai pour permettre le clic sur une suggestion

            input.addEventListener('input', function() {
                const query = this.value.trim();
                clearTimeout(schoolSearchTimeout);

                if (!query) {
                    showLocalSchoolSuggestions(ECOLES_POPULAIRES);
                    return;
                }

                // Filtrage local immédiat sur les écoles populaires
                const queryLower = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const localMatches = ECOLES_POPULAIRES.filter(e => {
                    const nameLower = e.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    const cityLower = (e.city || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    if (nameLower.includes(queryLower)) return true;
                    if (cityLower.includes(queryLower)) return true;
                    return e.aliases.some(a => a.includes(queryLower));
                });

                // Afficher les résultats locaux immédiatement
                if (localMatches.length > 0) {
                    showLocalSchoolSuggestions(localMatches);
                }

                // Lancer la recherche API en parallèle (à partir de 2 caractères)
                if (query.length >= 2) {
                    schoolSearchTimeout = setTimeout(() => {
                        searchSchool(query);
                    }, 300);
                } else if (localMatches.length === 0) {
                    suggestionsDiv.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.school-search-wrapper')) {
                    suggestionsDiv.style.display = 'none';

                suggestionsDiv.innerHTML = items.map(e => {

        async function searchSchool(query) {
            const suggestionsDiv = document.getElementById('schoolSuggestions');
            const ecoleInput = document.getElementById('ecole');

            // Ne pas afficher si le champ école n'a plus le focus
            if (document.activeElement !== ecoleInput) return;

            try {
                const seen = new Map();

                // Pré-remplir seen avec les résultats locaux déjà affichés
                const queryLowerAPI = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const localMatchesAPI = ECOLES_POPULAIRES.filter(e => {
                    const nameLower = e.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    const cityLower = (e.city || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    if (nameLower.includes(queryLowerAPI)) return true;
                    if (cityLower.includes(queryLowerAPI)) return true;
                    return e.aliases.some(a => a.includes(queryLowerAPI));
                });
                localMatchesAPI.forEach(e => {
                    const key = (e.name + '|' + (e.city || '')).toLowerCase();
                    seen.set(key, { name: e.name, city: e.city || '' });
                });

                const queryUpper = query.trim().toUpperCase();
                const expandedName = SIGLES_ECOLES[queryUpper] || null;
                const searchQueries = [query];
                if (expandedName) searchQueries.push(expandedName);

                if (!window._mbxSession) window._mbxSession = crypto.randomUUID();
                const allPromises = [];
                const promiseLabels = [];

                for (const q of searchQueries) {
                    const eq = encodeURIComponent(q);

                    // Mapbox Suggest
                    allPromises.push(
                        fetch('https://api.mapbox.com/search/searchbox/v1/suggest?q=' + encodeURIComponent(q) + '&language=fr&country=fr&types=poi&limit=5&session_token=' + window._mbxSession + '&access_token=' + MAPBOX_TOKEN)
                            .then(r => r.ok ? r.json() : { suggestions: [] }).catch(() => ({ suggestions: [] }))
                    );
                    promiseLabels.push('mapbox');

                    // Parcoursup
                    const psupBase = 'https://data.enseignementsup-recherche.gouv.fr/api/explore/v2.1/catalog/datasets/fr-esr-parcoursup/records';
                    const psupFields = 'g_ea_lib_vx%2Cville_etab';
                    allPromises.push(
                        fetch(psupBase + '?where=search(g_ea_lib_vx%2C%22' + eq + '%22)&limit=10&select=' + psupFields)
                            .then(r => r.ok ? r.json() : { results: [] }).catch(() => ({ results: [] }))
                    );
                    promiseLabels.push('parcoursup');

                    // Photon/OSM
                    allPromises.push(
                        fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(q) + '&limit=5&lang=fr&osm_tag=amenity:university&osm_tag=amenity:college&osm_tag=amenity:school')
                            .then(r => r.ok ? r.json() : { features: [] }).catch(() => ({ features: [] }))
                    );
                    promiseLabels.push('photon');
                }

                const allResults = await Promise.all(allPromises);

                function normalKey(name, city) {
                    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim();
                    return norm(name) + '|' + norm(city || '');
                }

                // Filtre : ne garder que les écoles des villes du lancement
                function isVilleLancement(city) {
                    if (!city) return false;
                    const cityNorm = city.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[-\s]/g, '');
                    return VILLES_LANCEMENT.some(v => {
                        const vNorm = v.replace(/[-\s]/g, '');
                        return cityNorm.includes(vNorm) || vNorm.includes(cityNorm);
                    });
                }

                const allRetrievePromises = [];

                for (let i = 0; i < allResults.length; i++) {
                    const data = allResults[i];
                    const label = promiseLabels[i];

                    if (label === 'mapbox' && data.suggestions) {
                        data.suggestions.filter(s => s.mapbox_id && s.name).slice(0, 3).forEach(s => {
                            allRetrievePromises.push(
                                fetch('https://api.mapbox.com/search/searchbox/v1/retrieve/' + s.mapbox_id + '?session_token=' + window._mbxSession + '&access_token=' + MAPBOX_TOKEN)
                                    .then(r => r.ok ? r.json() : null).catch(() => null)
                            );
                        });
                    } else if (label === 'parcoursup' && data.results) {
                        data.results.forEach(r => {
                            if (!isVilleLancement(r.ville_etab)) return;
                            const key = normalKey(r.g_ea_lib_vx, r.ville_etab);
                            if (!seen.has(key)) {
                                seen.set(key, { name: r.g_ea_lib_vx, city: r.ville_etab || '' });
                            }
                        });
                    } else if (label === 'photon' && data.features) {
                        data.features.forEach(f => {
                            const props = f.properties || {};
                            if (props.name) {
                                const city = props.city || props.county || '';
                                if (!isVilleLancement(city)) return;
                                const key = normalKey(props.name, city);
                                if (!seen.has(key)) {
                                    seen.set(key, { name: props.name, city });
                                }
                            }
                        });
                    }
                }

                // Résoudre les retrieve Mapbox
                const eduCategories = ['school', 'college', 'university', 'education', 'training', 'library'];
                const eduKeywords = ['école', 'ecole', 'université', 'universite', 'lycée', 'lycee', 'institut', 'campus', 'faculté', 'faculte', 'ensa', 'insa', 'isen', 'iut', 'cfa', 'formation', 'supérieur', 'superieur', 'académie', 'academie', 'conservatoire', 'polytech', 'business school', 'school of'];
                const retrieveResults = await Promise.all(allRetrievePromises);
                retrieveResults.forEach(rData => {
                    if (rData && rData.features && rData.features[0]) {
                        const f = rData.features[0];
                        const props = f.properties || {};
                        const name = props.name || '';
                        const city = props.context?.place?.name || props.context?.locality?.name || '';

                        if (!isVilleLancement(city)) return;

                        const categories = (props.poi_category || []).map(c => c.toLowerCase());
                        const nameLower = name.toLowerCase();
                        const isSchool = categories.some(c => eduCategories.includes(c)) ||
                                         eduKeywords.some(kw => nameLower.includes(kw));
                        if (!isSchool) return;

                        const key = normalKey(name, city);
                        if (name && !seen.has(key)) {
                            seen.set(key, { name, city });
                        }
                    }
                });

                let unique = Array.from(seen.values()).slice(0, 7);

                // Vérifier que le champ école a toujours le focus après les appels API
                if (document.activeElement !== ecoleInput) return;

                if (unique.length === 0) {
                    // Ne pas écraser les résultats locaux si présents
                    if (suggestionsDiv.querySelectorAll('.school-suggestion-item[data-name]').length > 0) return;
                    suggestionsDiv.innerHTML = '<div class="school-suggestion-item" style="color: #9CA3AF; cursor: default;">Aucun établissement trouvé</div>';
                    suggestionsDiv.style.display = 'block';
                    return;
                }

                suggestionsDiv.innerHTML = unique.map(r => {
                    const displayName = r.name + (r.city ? ' — ' + r.city : '');
                    return '<div class="school-suggestion-item" data-name="' + displayName.replace(/"/g, '&quot;') + '">'
                        + '<strong>' + r.name + '</strong>'
                        + (r.city ? '<small>' + r.city + '</small>' : '')
                        + '</div>';
                }).join('');

                // Click handlers
                suggestionsDiv.querySelectorAll('.school-suggestion-item[data-name]').forEach(item => {
                    item.addEventListener('click', () => {
                        document.getElementById('ecole').value = item.dataset.name;
                        suggestionsDiv.style.display = 'none';
                    });
                });

                suggestionsDiv.style.display = 'block';
            } catch (e) {
                console.error('Erreur recherche école:', e);
            }
        }

        (function setupAnneeSearch() {
            const input = document.getElementById('anneeEtudes');
            const suggestionsDiv = document.getElementById('anneeSuggestions');

            // Afficher toutes les suggestions au focus si le champ est vide
            input.addEventListener('focus', function() {
                if (!this.value.trim()) {
                    showAnneeSuggestions(ANNEES_ETUDES);
                }
            });

            input.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

                if (!query) {
                    showAnneeSuggestions(ANNEES_ETUDES);
                    return;
                }

                // Scoring par pertinence : label/value > alias, startsWith > includes
                const scored = [];
                ANNEES_ETUDES.forEach(a => {
                    const labelLower = a.label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    const valueLower = a.value.toLowerCase();
                    let score = 0;

                    if (valueLower.startsWith(query) || labelLower.startsWith(query)) {
                        score = 100;
                    } else if (labelLower.includes(query)) {
                        score = 80;
                    } else {
                        for (const alias of a.aliases) {
                            const aliasNorm = alias.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                            if (aliasNorm === query) {
                                score = Math.max(score, 70);
                            } else if (aliasNorm.startsWith(query)) {
                                score = Math.max(score, 50);
                            } else if (aliasNorm.includes(query)) {
                                score = Math.max(score, 30);
                            }
                        }
                    }

                    if (score > 0) scored.push({ annee: a, score });
                });

                scored.sort((a, b) => b.score - a.score);

                if (scored.length > 0) {
                    showAnneeSuggestions(scored.map(s => s.annee));
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.annee-search-wrapper')) {
                    suggestionsDiv.style.display = 'none';
                }
            });

            function showAnneeSuggestions(items) {
                suggestionsDiv.innerHTML = items.map(a => {
                    return '<div class="annee-suggestion-item" data-value="' + a.value + '">' + a.label + '</div>';
                }).join('');

                suggestionsDiv.querySelectorAll('.annee-suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        input.value = item.dataset.value;
                        suggestionsDiv.style.display = 'none';
                    });
                });

                suggestionsDiv.style.display = 'block';
            }
        })();

        (function setupFiliereSearch() {
            const input = document.getElementById('filiere');
            const suggestionsDiv = document.getElementById('filiereSuggestions');

            // Afficher toutes les suggestions au focus si le champ est vide
            input.addEventListener('focus', function() {
                if (!this.value.trim()) {
                    showFiliereSuggestions(FILIERES);
                }
            });

            input.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

                if (!query) {
                    showFiliereSuggestions(FILIERES);
                    return;
                }

                // Scoring par pertinence : nom > alias, startsWith > includes
                const scored = [];
                FILIERES.forEach(f => {
                    const valueLower = f.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    let score = 0;

                    // 1. Nom commence par la recherche → score max
                    if (valueLower.startsWith(query)) {
                        score = 100;
                    // 2. Un mot du nom commence par la recherche
                    } else if (valueLower.split(/[\s\/]+/).some(w => w.startsWith(query))) {
                        score = 80;
                    // 3. Nom contient la recherche
                    } else if (valueLower.includes(query)) {
                        score = 60;
                    } else {
                        // 4. Chercher dans les aliases
                        for (const alias of f.aliases) {
                            const aliasNorm = alias.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                            if (aliasNorm.startsWith(query)) {
                                score = Math.max(score, 40);
                            } else if (aliasNorm.includes(query)) {
                                score = Math.max(score, 20);
                            }
                        }
                    }

                    if (score > 0) scored.push({ filiere: f, score });
                });

                // Trier par score décroissant, puis par ordre alphabétique
                scored.sort((a, b) => b.score - a.score || a.filiere.value.localeCompare(b.filiere.value));

                if (scored.length > 0) {
                    showFiliereSuggestions(scored.map(s => s.filiere));
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.filiere-search-wrapper')) {
                    suggestionsDiv.style.display = 'none';
                }
            });

            function showFiliereSuggestions(items) {
                suggestionsDiv.innerHTML = items.map(f => {
                    return '<div class="filiere-suggestion-item" data-value="' + f.value.replace(/"/g, '&quot;') + '">' + f.value + '</div>';
                }).join('');

                suggestionsDiv.querySelectorAll('.filiere-suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        input.value = item.dataset.value;
                        suggestionsDiv.style.display = 'none';
                    });
                });

                suggestionsDiv.style.display = 'block';
            }
        })();

        // === AUTH CHECK ===
        async function checkAuth() {
            const { data: { user }, error: authError } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = 'connexion.html';
                return;
            }

            currentUser = user;

            const { data: userData, error: fetchError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', user.id)
                .single();

            if (userData) {
                // Les propriétaires ont leur propre page
                if (userData.type_user === 'proprietaire') {
                    window.location.href = 'modifier-profil-proprietaire.html';
                    return;
                }

                // Pré-remplir tous les champs existants depuis l'inscription
                if (userData.prenom) document.getElementById('prenom').value = userData.prenom;
                if (userData.nom) document.getElementById('nom').value = userData.nom;

                if (userData.sexe) {
                    const sexeSelect = document.getElementById('sexe');
                    sexeSelect.value = userData.sexe;
                    sexeSelect.classList.toggle('placeholder', !userData.sexe);
                }

                if (userData.date_naissance) {
                    const d = new Date(userData.date_naissance);
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    document.getElementById('dateNaissance').value = `${day}/${month}/${year}`;
                    document.getElementById('dateNaissanceHidden').value = userData.date_naissance;
                }

                if (userData.photo_profil_url) {
                    const preview = document.getElementById('photoPreview');
                    preview.src = userData.photo_profil_url;
                    preview.style.display = 'block';
                    document.getElementById('photoPlaceholder').style.display = 'none';
                }

                if (userData.ecole) document.getElementById('ecole').value = userData.ecole;
                if (userData.annee_etudes) document.getElementById('anneeEtudes').value = userData.annee_etudes;
                if (userData.filiere) document.getElementById('filiere').value = userData.filiere;
                if (userData.bio) document.getElementById('bio').value = userData.bio;

                // Profil déjà complet → redirection
                if (userData.profil_complet) {
                    if (userData.type_user === 'hote') {
                        window.location.href = 'dashboard-locataire.html';
                    } else {
                        window.location.href = 'dashboard-locataire.html';
                    }
                }
            }
        }

        // === ENREGISTREMENT ===
        async function enregistrerProfil() {
            const btn = document.getElementById('btnSave');
            btn.classList.add('loading');
            btn.textContent = 'Enregistrement...';

            try {
                const prenom = document.getElementById('prenom').value.trim();
                const nom = document.getElementById('nom').value.trim();
                const sexe = document.getElementById('sexe').value;
                const dateNaissance = document.getElementById('dateNaissanceHidden').value;
                const ecole = document.getElementById('ecole').value.trim();
                const anneeEtudes = document.getElementById('anneeEtudes').value.trim();
                const filiere = document.getElementById('filiere').value.trim();
                const bio = document.getElementById('bio').value.trim();

                // Upload photo
                let photoUrl = null;
                if (photoFile) {
                    const fileExt = photoFile.name.split('.').pop();
                    const fileName = `${currentUser.id}-${Date.now()}.${fileExt}`;

                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('profils')
                        .upload(fileName, photoFile, { cacheControl: '3600', upsert: true });

                    if (!uploadError) {
                        const { data: urlData } = supabaseClient.storage
                            .from('profils')
                            .getPublicUrl(fileName);
                        photoUrl = urlData.publicUrl;
                    }
                }

                const updateData = {
                    prenom, nom, sexe,
                    date_naissance: dateNaissance,
                    ecole, annee_etudes: anneeEtudes, filiere,
                    bio: bio || null,
                    profil_complet: true
                };

                // Ne mettre à jour la photo que si une nouvelle a été uploadée
                if (photoUrl) {
                    updateData.photo_profil_url = photoUrl;
                }

                const { error } = await supabaseClient
                    .from('users')
                    .update(updateData)
                    .eq('id', currentUser.id);

                if (error) throw error;

                // Confirmation
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                const stepIndicator = document.querySelector('.step-indicator');
                if (stepIndicator) stepIndicator.style.display = 'none';
                const progressBar = document.querySelector('.progress-bar');
                if (progressBar) progressBar.style.display = 'none';
                const mainTitle = document.getElementById('mainTitle');
                if (mainTitle) mainTitle.style.display = 'none';
                const backLink = document.querySelector('.back-link');
                if (backLink) backLink.style.display = 'none';
                document.getElementById('confirmationScreen').classList.add('active');

                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('type_user')
                    .eq('id', currentUser.id)
                    .single();

                setTimeout(() => {
                    if (userData.type_user === 'proprietaire') {
                        window.location.href = 'dashboard-proprietaire.html';
                    } else if (userData.type_user === 'hote') {
                        window.location.href = 'dashboard-locataire.html';
                    } else {
                        window.location.href = 'dashboard-locataire.html';
                    }
                }, 2000);

            } catch (err) {
                console.error('Erreur enregistrement profil:', err);
                btn.classList.remove('loading');
                btn.textContent = 'Enregistrer';
                showError(err.message || 'Une erreur est survenue');
            }
        }

        // Init
        if (typeof supabaseClient !== 'undefined') {
            checkAuth();
        }
