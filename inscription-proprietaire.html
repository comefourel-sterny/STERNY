<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-dark-32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="favicon.ico" sizes="any" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.ico" sizes="any" media="(prefers-color-scheme: dark)">

    <link rel="canonical" href="https://sterny.co/inscription-proprietaire.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sterny.co/inscription-proprietaire.html">
    <meta property="og:title" content="Inscription Propriétaire — STERNY">
    <meta property="og:description" content="Louez votre logement à des étudiants en alternance vérifiés.">
    <meta property="og:image" content="https://sterny.co/og-image.png">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .page-inscription {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .inscription-container {
            max-width: 460px;
            width: 100%;
            height: 541px;
            background: white;
            border-radius: 20px;
            padding: 36px 36px;
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.12);
            border: 1.5px solid #E8EAF0;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .inscription-container:hover {
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.16);
        }

        .inscription-container form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .inscription-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .inscription-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1E293B;
            margin: 0;
        }

        /* Bannière parrainage inline */
        .referral-inline {
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .referral-inline.show {
            display: block;
        }

        .referral-inline .referrer-name {
            font-weight: 700;
        }

        /* Ligne double prénom/nom */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 8px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 4px;
        }

        .form-group .required {
            color: #ef4444;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E8EAF0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #F4F5F7;
            color: #1E293B;
        }

        .form-group input:focus {
            border-color: #1E293B;
            box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1);
            background: white;
        }

        .form-group input:hover {
            border-color: #CBD5E1;
        }

        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #F4F5F7 inset;
            -webkit-text-fill-color: #1E293B;
            border-color: #E5E7EB;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 85px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #6B7280;
            font-weight: 600;
            padding: 4px 8px;
            transition: color 0.3s;
            font-family: inherit;
        }

        .toggle-password:hover {
            color: #E8622A;
        }

        /* Code parrainage */
        .parrainage-group {
            margin-bottom: 0;
        }

        .parrainage-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 4px;
        }

        .parrainage-group .optional-tag {
            font-size: 10px;
            font-weight: 500;
            color: #9CA3AF;
            background: #F3F4F6;
            padding: 2px 7px;
            border-radius: 6px;
        }

        .parrainage-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #FF9B70;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #FFF7ED;
            color: #1E293B;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .parrainage-group input:focus {
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.1);
            background: #FFF7ED;
        }

        .parrainage-group input::placeholder {
            text-transform: none;
            letter-spacing: normal;
            color: #D4856A;
        }

        .parrainage-status {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
            display: none;
        }

        .parrainage-status.valid {
            color: #059669;
            display: block;
        }

        .parrainage-status.invalid {
            color: #EF4444;
            display: block;
        }

        .parrainage-status.checking {
            color: #6B7280;
            display: block;
        }

        /* Error / Success */
        .error-box {
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .error-box.error {
            display: block;
            background: rgba(232, 98, 42, 0.08);
            color: #E8622A;
        }

        .error-box.success {
            display: block;
            background: #D1FAE5;
            color: #065F46;
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-top: auto;
        }

        .submit-btn:hover {
            background: #E8622A;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 98, 42, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #F3F4F6;
            color: #6B7280;
            font-size: 14px;
        }

        .back-link a {
            color: #E8622A;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="rate-limiter.js"></script>
    <script src="analytics.js" defer></script>
</head>
<body>
    <!-- NAVIGATION -->
    <nav role="navigation" aria-label="Navigation principale">
        <div class="container">
            <a href="index.html" class="logo"><img src="Logo-Sterny-V1.svg" alt="STERNY"></a>
            <button class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="menu-overlay" onclick="toggleMenu()"></div>
        <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="connexion.html">Connexion</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
            </ul>
        </div>
    </nav>

    <section class="page-inscription">
        <div class="inscription-container">
            <div class="inscription-header">
                <h2>Créer un compte</h2>
            </div>

            <!-- Bannière parrainage inline (si parrain dans l'URL) -->
            <div class="referral-inline" id="referralBanner">
                <span class="referrer-name" id="referrerName"></span> vous recommande STERNY
            </div>

            <div id="messageBox" class="error-box"></div>

            <form id="inscriptionForm" onsubmit="inscrireProprietaire(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" placeholder="Jean" required>
                    </div>
                    <div class="form-group">
                        <label>Nom <span class="required">*</span></label>
                        <input type="text" id="nom" placeholder="Dupont" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="jean.dupont@email.com" required>
                </div>

                <div class="form-group">
                    <label>Mot de passe <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Minimum 6 caractères" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            Afficher
                        </button>
                    </div>
                </div>

                <div class="parrainage-group">
                    <label>
                        Code de parrainage
                        <span class="optional-tag">Optionnel</span>
                    </label>
                    <input type="text" id="codeParrainage" placeholder="Ex : THOMAS-2K7P" autocomplete="off">
                    <div class="parrainage-status" id="parrainageStatus"></div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Créer mon compte
                </button>
            </form>

            <div class="back-link">
                <a href="choix-inscription.html">← Retour</a> · Déjà inscrit ? <a href="connexion.html">Se connecter</a>
            </div>
        </div>
    </section>

    <script>
        // Formatage automatique Nom / Prénom
        function capitalizeWords(str) {
            return str.replace(/(?:^|[\s-])([a-zA-ZÀ-ÿ])/g, function(match) {
                return match.toUpperCase();
            });
        }
        document.getElementById('nom').addEventListener('input', function(e) {
            const pos = e.target.selectionStart;
            e.target.value = capitalizeWords(e.target.value);
            e.target.setSelectionRange(pos, pos);
        });
        document.getElementById('prenom').addEventListener('input', function(e) {
            const pos = e.target.selectionStart;
            e.target.value = capitalizeWords(e.target.value);
            e.target.setSelectionRange(pos, pos);
        });

        // Détecter le parrain dans l'URL et pré-remplir le code
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const parrain = urlParams.get('parrain');
            const codeFromUrl = urlParams.get('code');
            const referrerIdFromSession = sessionStorage.getItem('referrer_id');
            const referralCodeFromSession = sessionStorage.getItem('referral_code');

            // Afficher la bannière si parrain dans l'URL
            if (parrain) {
                const referralBanner = document.getElementById('referralBanner');
                const referrerName = document.getElementById('referrerName');

                const formattedName = parrain
                    .split('-')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');

                referrerName.textContent = formattedName;
                referralBanner.classList.add('show');
            }

            // Pré-remplir le code parrainage si présent dans l'URL ou sessionStorage
            const code = codeFromUrl || referralCodeFromSession;
            if (code) {
                const codeInput = document.getElementById('codeParrainage');
                codeInput.value = code.toUpperCase();
                // Déclencher la vérification
                codeInput.dispatchEvent(new Event('input'));
            }
        });

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Masquer';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Afficher';
            }
        }

        // Vérification du code de parrainage en temps réel
        let parrainData = null;
        let debounceTimer = null;

        document.getElementById('codeParrainage').addEventListener('input', function(e) {
            const code = e.target.value.trim().toUpperCase();
            const statusEl = document.getElementById('parrainageStatus');

            // Reset
            parrainData = null;

            if (!code || code.length < 4) {
                statusEl.className = 'parrainage-status';
                statusEl.textContent = '';
                return;
            }

            // Debounce 500ms
            clearTimeout(debounceTimer);
            statusEl.className = 'parrainage-status checking';
            statusEl.textContent = 'Vérification...';

            debounceTimer = setTimeout(async () => {
                try {
                    const { data, error } = await supabaseClient
                        .from('users')
                        .select('id, prenom, nom')
                        .eq('code_parrainage', code)
                        .single();

                    if (error || !data) {
                        statusEl.className = 'parrainage-status invalid';
                        statusEl.textContent = 'Code non reconnu';
                        parrainData = null;
                    } else {
                        statusEl.className = 'parrainage-status valid';
                        statusEl.textContent = `Parrainé par ${data.prenom} ${data.nom}`;
                        parrainData = data;
                    }
                } catch (err) {
                    statusEl.className = 'parrainage-status invalid';
                    statusEl.textContent = 'Code non reconnu';
                    parrainData = null;
                }
            }, 500);
        });

        // Inscription du propriétaire
        async function inscrireProprietaire(event) {
            event.preventDefault();

            // Rate limit : max 3 inscriptions par 5 minutes
            if (!RateLimiter.check('signup', 3, 300000, { persistent: true })) return;

            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');

            const prenom = document.getElementById('prenom').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Création en cours...';

            try {
                // Récupérer le parrain_id si un code valide a été entré
                let parrainId = null;
                const codeInput = document.getElementById('codeParrainage').value.trim().toUpperCase();

                if (codeInput && !parrainData) {
                    // Code entré mais pas validé — on re-vérifie
                    const { data, error } = await supabaseClient
                        .from('users')
                        .select('id, prenom, nom')
                        .eq('code_parrainage', codeInput)
                        .single();

                    if (data) {
                        parrainId = data.id;
                    }
                } else if (parrainData) {
                    parrainId = parrainData.id;
                }

                // Fallback : si pas de code validé, vérifier sessionStorage
                if (!parrainId) {
                    const sessionParrainId = sessionStorage.getItem('referrer_id');
                    if (sessionParrainId) {
                        parrainId = sessionParrainId;
                    }
                }

                // 1. Créer le compte Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                // 2. Créer l'entrée dans la table users
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([
                        {
                            id: authData.user.id,
                            prenom: prenom,
                            nom: nom,
                            email: email,
                            type_user: 'proprietaire',
                            parrain_id: parrainId,
                            code_parrainage: null
                        }
                    ]);

                if (insertError) throw insertError;

                showMessage('success', 'Compte créé avec succès ! Redirection...');

                setTimeout(() => {
                    window.location.href = 'dashboard-proprietaire.html';
                }, 2000);

            } catch (error) {
                console.error('Erreur:', error);
                showMessage('error', error.message === 'User already registered'
                    ? 'Un compte existe déjà avec cet email'
                    : error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Créer mon compte';
            }
        }

        // Afficher un message
        function showMessage(type, text) {
            const messageBox = document.getElementById('messageBox');
            messageBox.className = 'error-box ' + type;
            messageBox.textContent = text;
        }
    </script>
<script src="cookie-banner.js"></script>
<script>function toggleMenu(){var u=document.querySelector("nav ul");var h=document.querySelector(".hamburger");var o=document.querySelector(".menu-overlay");u.classList.toggle("open");h.classList.toggle("active");o.classList.toggle("active");}</script>
</body>
