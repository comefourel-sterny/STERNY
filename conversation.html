<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="PP-Sterny-V1.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-white.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="favicon.ico" sizes="any" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.ico" sizes="any" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Conversation — STERNY</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="analytics.js" defer></script>
    <script src="notifications.js" defer></script>
</head>
<body>
    <script>
        // Redirection vers le dashboard (les conversations sont maintenant dans l'overlay du dashboard)
        async function redirect() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    window.location.href = 'connexion.html';
                    return;
                }
                const { data } = await supabaseClient.from('users').select('type_user').eq('id', user.id).single();
                if (data && data.type_user === 'proprietaire') {
                    window.location.href = 'dashboard-proprietaire.html';
                } else {
                    window.location.href = 'dashboard-locataire.html';
                }
            } catch (e) {
                window.location.href = 'dashboard-locataire.html';
            }
        }
        if (typeof supabaseClient !== 'undefined') redirect();
    </script>
<script src="cookie-banner.js"></script>
</body>
</html>
