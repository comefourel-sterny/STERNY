<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Calendrier propre</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      padding: 40px;
    }

    /* CONTENEUR DES 3 MOIS */
    .calendar-wrapper {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* UN MOIS */
    .month-calendar {
      background: #fff;
      border: 2px solid #4f46e5;
      border-radius: 12px;
      padding: 16px;
    }

    .month-title {
      text-align: center;
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 12px;
    }

    /* JOURS DE LA SEMAINE */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    /* GRILLE DES JOURS */
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
      font-size: 14px;
    }

    .day {
      padding: 6px 0;
      border-radius: 6px;
      cursor: pointer;
    }

    .day:hover {
      background: #eef2ff;
    }
  </style>
</head>
<body>

  <h2 style="text-align:center; margin-bottom: 30px;">Tes disponibilités</h2>

  <div class="calendar-wrapper">

    <!-- JANVIER -->
    <div class="month-calendar">
      <div class="month-title">Janvier 2026</div>
      <div class="weekdays">
        <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
      </div>
      <div class="days">
        <!-- jours fictifs pour structure -->
        <div></div><div></div><div></div>
        <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div>
        <div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div>
        <div class="day">9</div><div class="day">10</div><div class="day">11</div>
      </div>
    </div>

    <!-- FÉVRIER -->
    <div class="month-calendar">
      <div class="month-title">Février 2026</div>
      <div class="weekdays">
        <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
      </div>
      <div class="days">
        <div></div><div></div><div></div><div></div><div></div>
        <div class="day">1</div><div class="day">2</div>
        <div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div>
      </div>
    </div>

    <!-- MARS -->
    <div class="month-calendar">
      <div class="month-title">Mars 2026</div>
      <div class="weekdays">
        <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
      </div>
      <div class="days">
        <div class="day">1</div><div class="day">2</div><div class="day">3</div>
        <div class="day">4</div><div class="day">5</div><div class="day">6</div>
      </div>
    </div>

  </div>

</body>
</html>
