<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour les propriétaires - AlternHome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .hero-proprio {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-proprio::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        
        .hero-proprio .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .hero-proprio h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 0;
            line-height: 1.2;
        }
        
        .video-section {
            padding: 80px 20px;
            background: white;
        }
        
        .video-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .video-placeholder {
            width: 100%;
            height: 600px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .video-placeholder:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 70px rgba(102, 126, 234, 0.4);
        }
        
        .advantages-section {
            padding: 80px 20px;
            background: #f9fafb;
        }
        
        .advantages-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .avantages-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .avantage-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: default;
        }
        
        .avantage-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .avantage-icon {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .avantage-icon .number {
            font-size: 72px;
            font-weight: 800;
            color: white;
            opacity: 0.9;
        }
        
        .avantage-content {
            padding: 30px 25px;
            text-align: center;
        }
        
        .avantage-content h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            line-height: 1.4;
        }
        
        .cta-section {
            padding: 80px 20px;
            background: #F9FAFB;
            text-align: center;
        }
        
        .cta-card {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .cta-section h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a202c;
        }
        
        .cta-section p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #4a5568;
        }
        
        #ctaButtons {
            margin-top: 20px;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.3);
        }
        
        .cta-btn-secondary {
            display: inline-block;
            padding: 14px 35px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .cta-btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav>
        <div class="container">
            <a href="index.html" class="logo">🏠 AlternHome</a>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="#" id="monEspaceLink">Mon espace</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
                <li><a href="creer-annonce.html">Devenir hôte</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-proprio">
        <div class="container">
            <h1>Rentabilisez votre logement<br>différemment</h1>
        </div>
    </section>

    <!-- VIDÉO -->
    <section class="video-section">
        <div class="video-container">
            <h2 style="font-size: 38px; font-weight: 700; text-align: center; margin-bottom: 50px; color: #1a202c;">Comment ça marche ?</h2>
            <div class="video-placeholder">
                🎬 Vidéo explicative propriétaires<br>
                (2 minutes - à venir)
            </div>
            
            <!-- CTA juste après la vidéo -->
            <div style="text-align: center; margin-top: 60px;">
                <h2 style="font-size: 28px; font-weight: 700; margin-bottom: 15px; color: #1a202c;">Prêt à maximiser vos revenus locatifs ?</h2>
                <p id="ctaText" style="font-size: 16px; margin-bottom: 30px; color: #4a5568;">Rejoignez les propriétaires AlternHome dès aujourd'hui</p>
                <div id="ctaButtons">
                    <!-- Sera rempli par JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <script>
        async function gererLienMonEspace() {
            const lien = document.getElementById('monEspaceLink');
            if (!lien) return;
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('type_user')
                    .eq('id', user.id)
                    .single();
                
                if (userData?.type_user === 'hote') {
                    lien.href = 'dashboard-hote.html';
                } else {
                    lien.href = 'dashboard-locataire.html';
                }
            } else {
                lien.href = 'connexion.html';
            }
        }
        
        // Gérer le CTA selon le statut de connexion
        async function gererCTA() {
            const ctaButtons = document.getElementById('ctaButtons');
            const ctaText = document.getElementById('ctaText');
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                // Connecté
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('type_user')
                    .eq('id', user.id)
                    .single();
                
                if (userData?.type_user === 'hote') {
                    // Propriétaire connecté
                    ctaText.textContent = "Gérez vos annonces dès maintenant";
                    ctaButtons.innerHTML = '<a href="dashboard-hote.html" class="cta-btn">Mon espace propriétaire</a>';
                } else {
                    // Locataire connecté (ne devrait pas arriver ici normalement)
                    ctaText.textContent = "Vous êtes connecté en tant que locataire";
                    ctaButtons.innerHTML = '<a href="dashboard-locataire.html" class="cta-btn">Mon espace</a>';
                }
            } else {
                // Non connecté : 2 boutons
                ctaButtons.innerHTML = `
                    <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                        <a href="inscription.html" class="cta-btn">Créer mon compte</a>
                        <a href="connexion.html" class="cta-btn-secondary">Se connecter</a>
                    </div>
                `;
            }
        }
        
        gererLienMonEspace();
        gererCTA();
    </script>
</body>
</html>
