<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-32.png?v=2" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="PP-Sterny-V1-dark-32.png?v=2" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="favicon.ico?v=2" sizes="any" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.ico?v=2" sizes="any" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Connexion — STERNY</title>
    <meta name="description" content="Connectez-vous à votre espace STERNY pour gérer vos candidatures, messages et contrats de location.">
    <link rel="canonical" href="https://sterny.co/connexion.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sterny.co/connexion.html">
    <meta property="og:title" content="Connexion — STERNY">
    <meta property="og:description" content="Accédez à votre espace STERNY.">
    <meta property="og:image" content="https://sterny.co/og-image.png">
    <meta property="og:locale" content="fr_FR">
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .page-connexion {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F5F7;
            padding: 40px 20px;
        }

        .connexion-card {
            max-width: 460px;
            min-height: 546px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 36px 36px;
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.12);
            border: 1.5px solid #E8EAF0;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .connexion-card form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .connexion-card .submit-btn {
            margin-top: auto;
        }

        .connexion-card:hover {
            box-shadow: 0 6px 28px rgba(232, 98, 42, 0.16);
        }

        /* Header */
        .connexion-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .connexion-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1E293B;
            margin: 0 0 6px 0;
        }

        .connexion-header p {
            color: #6B7280;
            font-size: 15px;
            margin: 0;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 16px;
            border: 1.5px solid #E8EAF0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #F4F5F7;
            color: #1E293B;
        }

        .form-group input:focus {
            border-color: #E8622A;
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.08);
            background: white;
        }

        .form-group input:hover {
            border-color: #CBD5E1;
        }

        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #F4F5F7 inset;
            -webkit-text-fill-color: #1E293B;
            border-color: #E8EAF0;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 85px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #6B7280;
            font-weight: 600;
            padding: 4px 8px;
            transition: color 0.3s;
            font-family: inherit;
        }

        .toggle-password:hover {
            color: #E8622A;
        }

        /* Forgot password */
        .forgot-password {
            text-align: right;
            margin-top: 4px;
            margin-bottom: 18px;
        }

        .forgot-password a {
            color: #9CA3AF;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #E8622A;
        }

        /* Error message */
        .error-box {
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .error-box.error {
            display: block;
            background: rgba(232, 98, 42, 0.08);
            color: #E8622A;
        }

        .error-box.success {
            display: block;
            background: #D1FAE5;
            color: #065F46;
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #E8622A;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: #d4571f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 98, 42, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1.5px solid #E8EAF0;
            color: #6B7280;
            font-size: 14px;
        }

        .back-link a {
            color: #E8622A;
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="rate-limiter.js"></script>
    <script src="analytics.js" defer></script>
</head>
<body>
    <!-- NAVIGATION -->
    <nav role="navigation" aria-label="Navigation principale">
        <div class="container">
            <a href="index.html" class="logo"><img src="Logo-Sterny-V1.svg" alt="STERNY"></a>
            <button class="hamburger" onclick="toggleMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
        <div class="menu-overlay" onclick="toggleMenu()"></div>
        <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="connexion.html" class="nav-highlight">Connexion</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-connexion">
        <div class="connexion-card">
            <div class="connexion-header">
                <h2>Connexion</h2>
                <p>Content de te revoir !</p>
            </div>

            <div id="messageBox" class="error-box"></div>

            <form id="connexionForm" onsubmit="seConnecter(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ton.email@exemple.com" required>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Ton mot de passe" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            Afficher
                        </button>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Se connecter
                </button>
            </form>

            <div class="back-link">
                Pas encore de compte ? <a href="choix-inscription.html">Inscris-toi</a>
            </div>
        </div>
    </div>

    <script>
        async function seConnecter(event) {
            event.preventDefault();

            // Rate limit : max 5 tentatives par minute (anti brute-force)
            if (!RateLimiter.check('login', 5, 60000, { persistent: true })) return;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion en cours...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('type_user, is_admin')
                    .eq('id', data.user.id)
                    .single();

                if (userError) throw userError;

                messageBox.textContent = 'Connexion réussie ! Redirection...';
                messageBox.className = 'error-box success';

                setTimeout(() => {
                    if (userData.is_admin) {
                        window.location.href = 'dashboard-admin.html';
                    } else if (userData.type_user === 'proprietaire') {
                        window.location.href = 'dashboard-proprietaire.html';
                    } else {
                        window.location.href = 'dashboard-locataire.html';
                    }
                }, 1000);

            } catch (error) {
                messageBox.textContent = (error.message === 'Invalid login credentials'
                    ? 'Email ou mot de passe incorrect'
                    : error.message);
                messageBox.className = 'error-box error';

                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Masquer';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Afficher';
            }
        }
    </script>
<script src="cookie-banner.js"></script>
<script>function toggleMenu(){var u=document.querySelector("nav ul");var h=document.querySelector(".hamburger");var o=document.querySelector(".menu-overlay");u.classList.toggle("open");h.classList.toggle("active");o.classList.toggle("active");}</script>
</body>
</html>
