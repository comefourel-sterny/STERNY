<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AlternHome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body {
            background: var(--gray-50);
        }
        
        /* CONTAINER CONNEXION */
        .connexion-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 0 20px;
        }
        
        .connexion-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 2px solid #E0E7FF;
            transition: all 0.3s;
        }
        
        .connexion-card:hover {
            box-shadow: 0 8px 24px rgba(102,126,234,0.15);
            border-color: #667eea;
        }
        
        .connexion-card h1 {
            font-size: 32px;
            color: var(--gray-900);
            margin-bottom: 12px;
            text-align: center;
            font-weight: 700;
        }
        
        .connexion-card p {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 35px;
            font-size: 16px;
        }
        
        /* FORMULAIRE */
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E0E7FF;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        
        .form-group input:hover {
            border-color: #a5b4fc;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
        }
        
        /* MESSAGES */
        .message {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid #10B981;
            display: block;
        }
        
        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #EF4444;
            display: block;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid var(--gray-100);
            color: var(--gray-600);
            font-size: 15px;
        }
        
        .signup-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .signup-link a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        
        .forgot-password a {
            color: var(--primary);
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        /* Bouton toggle password */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: var(--gray-500);
            font-weight: 500;
            padding: 4px 8px;
            transition: color 0.3s;
        }
        
        .toggle-password:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav>
        <div class="container">
            <a href="index.html" class="logo">🏠 AlternHome</a>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="connexion.html">Connexion</a></li>
                <li><a href="comment-ca-marche.html">Comment ça marche</a></li>
            </ul>
        </div>
    </nav>

    <!-- FORMULAIRE CONNEXION -->
    <div class="connexion-container">
        <div class="connexion-card">
            <h1>Connexion</h1>
            <p>Content de te revoir ! 👋</p>
            
            <div id="messageBox" class="message"></div>
            
            <!-- FORMULAIRE -->
            <form id="connexionForm" onsubmit="seConnecter(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ton.email@exemple.com" required>
                </div>
                
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Ton mot de passe" required style="padding-right: 85px;">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                           Afficher
                        </button>
                    </div>
                </div>
                
                <div class="forgot-password">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Se connecter
                </button>
            </form>
            
            <div class="signup-link">
                Pas encore de compte ? <a href="choix-inscription.html">Inscris-toi</a>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <p>&copy; 2024 AlternHome. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        // CONNEXION
        async function seConnecter(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');
            
            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion en cours...';
            
            try {
                // Connexion avec Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Récupérer le type d'utilisateur
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .select('type_user')
                    .eq('id', data.user.id)
                    .single();
                
                if (userError) throw userError;
                
                // Afficher message de succès
                messageBox.textContent = '✓ Connexion réussie ! Redirection...';
                messageBox.className = 'message success';
                
                // Redirection selon le type d'utilisateur
                setTimeout(() => {
                    if (userData.type_user === 'hote') {
                        window.location.href = 'dashboard-hote.html';
                    } else {
                        window.location.href = 'dashboard-locataire.html';
                    }
                }, 1000);
                
            } catch (error) {
                // Afficher l'erreur
                messageBox.textContent = '✗ ' + (error.message === 'Invalid login credentials' 
                    ? 'Email ou mot de passe incorrect' 
                    : error.message);
                messageBox.className = 'message error';
                
                // Réactiver le bouton
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        }
        
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Masquer';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Afficher';
            }
        }
    </script>
</body>
</html>
